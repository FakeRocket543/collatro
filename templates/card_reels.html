<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; width: 1080px; height: 1920px; overflow: hidden; }
  .card { width: 1080px; height: 1920px; }
  .inner {
    width: calc(1080px / {{font_scale}});
    height: calc(1920px / {{font_scale}});
    transform: scale({{font_scale}});
    transform-origin: top left;
  }
</style>
</head>
<body>
<div class="card bg-{{bg_dark}}">
<div class="inner text-white p-16 flex flex-col justify-between">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-4xl font-bold text-{{accent}}">Collatro</h1>
    <span class="text-base text-{{text_muted}}">事實查證</span>
  </div>

  <!-- Original claim (big) -->
  <div class="bg-{{bg_card}} rounded-2xl p-10">
    <p class="text-3xl leading-relaxed font-medium">{{claim_text}}</p>
  </div>

  <!-- Verdict badge (huge, centered) -->
  <div class="flex flex-col items-center gap-4">
    <span class="text-7xl font-black {{verdict_color}}">{{verdict_label}}</span>
    <p class="text-xl text-{{text_muted}} text-center leading-relaxed">{{summary}}</p>
  </div>

  <!-- Branding footer -->
  <div class="text-center text-sm text-{{text_muted}}">collatro — 貼上就查</div>
</div>
</div>
</body>
</html>
