<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; width: 1080px; }
  .card { width: 1080px; min-height: 600px; }
</style>
</head>
<body>
<div class="card bg-{{bg_dark}} text-white p-10 flex flex-col gap-5">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-{{accent}}">Collatro</h1>
    <span class="text-sm text-{{text_muted}}">事實比對卡</span>
  </div>

  <!-- Original claim -->
  <div class="bg-{{bg_card}} rounded-xl p-5">
    <div class="text-xs text-{{text_muted}} mb-1 uppercase tracking-wide">原始聲明</div>
    <p class="text-lg leading-relaxed">{{claim_text}}</p>
  </div>

  <!-- KG Tags -->
  {{kg_tags}}

  <!-- Verdict badge -->
  <div class="flex items-center gap-3">
    <span class="text-xl font-bold {{verdict_color}}">{{verdict_label}}</span>
    <span class="text-sm text-{{text_muted}}">{{summary}}</span>
  </div>

  <!-- Diff results -->
  <div class="space-y-3">
    {{mismatches}}
  </div>

  <!-- Sources -->
  <div class="border-t border-{{border}} pt-4 space-y-1">
    <div class="text-xs text-{{text_muted}} mb-1">參考來源</div>
    {{sources}}
  </div>
</div>
</body>
</html>
